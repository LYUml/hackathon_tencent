name: Deploy Unity WebGL to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build WebGL
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          sparse-checkout: |
            game/huapi
          sparse-checkout-cone-mode: false

      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: game/huapi/Library
          key: Library-huapi-WebGL-${{ hashFiles('game/huapi/Assets/**', 'game/huapi/Packages/**', 'game/huapi/ProjectSettings/**') }}
          restore-keys: |
            Library-huapi-WebGL-

      - name: Build Unity WebGL
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          projectPath: game/huapi
          unityVersion: 6000.3.10f1
          targetPlatform: WebGL
          buildsPath: build

      - name: Patch WebGL page shell
        run: |
          INDEX="build/WebGL/WebGL/index.html"
          test -f "$INDEX"
          sudo chown -R "$USER:$USER" build/WebGL/WebGL
          node <<'NODE'
          const fs = require('fs');
          const index = 'build/WebGL/WebGL/index.html';
          let html = fs.readFileSync(index, 'utf8');
          html = html.replace(
            /<canvas id="unity-canvas" width=\d+ height=\d+ tabindex="-1"><\/canvas>/,
            '<canvas id="unity-canvas" width=1920 height=1080 tabindex="-1"></canvas>'
          );
          const style = '/* codex-fullscreen-shell */html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;}#unity-container{position:fixed;inset:0;width:100vw;height:100vh;background:#000;}#unity-canvas{width:100vw!important;height:100vh!important;display:block;background:#000;}#unity-footer{display:none!important;}#unity-loading-bar{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);}';
          if (!html.includes('codex-fullscreen-shell')) {
            html = html.replace('</head>', `<style>${style}</style></head>`);
          }
          html = html.replace(
            /canvas\.style\.width = "960px";\s*canvas\.style\.height = "600px";/s,
            'canvas.style.width = "100vw";\n        canvas.style.height = "100vh";'
          );
          fs.writeFileSync(index, html);
          NODE

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/WebGL/WebGL

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
